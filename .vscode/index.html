<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - ก้าวแรกของการเขียนเว็บ</title>
    <style>
        body {
            font-family: 'Sarabun', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #6a0dad; /* พื้นหลังสีม่วง */
            color: white;              /* ตัวหนังสือสีขาว */
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 3.5em;
            margin: 0 0 20px 0;
        }
        p {
            font-size: 1.3em;
        }
        /* เอฟเฟกต์กระพริบ */
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .blink {
            animation: blink 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Hello, World!</h1>
        <p class="blink">ยินดีต้อนรับสู่ก้าวแรกของการเขียนเว็บไซต์ครับ</p>
    </div>
</body>
</html>
