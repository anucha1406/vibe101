<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>วิทยาลัยเทคนิคลพบุรี - ระบบอนาคต</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap');

        :root {
            --primary-maroon: #800000;
            --dark-maroon: #5a0000;
            --light-maroon: #a30000;
            --neon-red: #ff0033;
            --futuristic-white: #f0f0f0;
            --futuristic-gray: #1a1a1a;
            --glow-blue: #00ccff;
            --glow-purple: #9933ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', 'Sarabun', Arial, sans-serif;
            background: linear-gradient(135deg, 
                var(--futuristic-gray) 0%, 
                #2a1a1a 30%, 
                var(--dark-maroon) 70%, 
                #1a0000 100%);
            min-height: 100vh;
            color: var(--futuristic-white);
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 0, 51, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(0, 204, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(153, 51, 255, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        /* Futuristic Grid Background */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -2;
        }

        /* Navigation Menu - Futuristic */
        .navbar {
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 0, 51, 0.3);
            box-shadow: 0 0 30px rgba(255, 0, 51, 0.2);
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .school-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .school-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--neon-red) 0%, var(--light-maroon) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 0 0 20px rgba(255, 0, 51, 0.5);
            position: relative;
            overflow: hidden;
        }

        .school-icon::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(255, 255, 255, 0.1) 50%,
                transparent 70%
            );
            animation: shine 3s infinite linear;
        }

        @keyframes shine {
            0% { transform: translateX(-100%) translateY(-100%) rotate(45deg); }
            100% { transform: translateX(100%) translateY(100%) rotate(45deg); }
        }

        .school-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(90deg, var(--futuristic-white), var(--neon-red));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 0, 51, 0.3);
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 25px;
        }

        .nav-item {
            position: relative;
        }

        .nav-link {
            font-family: 'Orbitron', sans-serif;
            color: var(--futuristic-white);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            padding: 10px 20px;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 1px solid transparent;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 51, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .nav-link:hover::before {
            left: 100%;
        }

        .nav-link:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.3);
            background: rgba(255, 0, 51, 0.1);
        }

        .nav-link.active {
            background: rgba(255, 0, 51, 0.2);
            border-color: var(--neon-red);
            box-shadow: 0 0 20px rgba(255, 0, 51, 0.4);
        }

        /* Main Content - Futuristic */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
            min-height: calc(100vh - 160px);
        }

        .login-container {
            background: rgba(26, 26, 26, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 24px;
            border: 1px solid rgba(255, 0, 51, 0.4);
            box-shadow: 
                0 0 40px rgba(255, 0, 51, 0.3),
                0 0 80px rgba(0, 204, 255, 0.1),
                inset 0 0 20px rgba(255, 255, 255, 0.05);
            padding: 50px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .login-container::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, 
                var(--neon-red), 
                var(--glow-blue), 
                var(--glow-purple), 
                var(--neon-red));
            border-radius: 26px;
            z-index: -1;
            animation: borderGlow 4s linear infinite;
            background-size: 400% 400%;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .school-header {
            margin-bottom: 40px;
        }

        .school-logo {
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, var(--neon-red) 0%, var(--light-maroon) 100%);
            border-radius: 25px;
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 60px;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            box-shadow: 
                0 0 30px rgba(255, 0, 51, 0.6),
                inset 0 0 20px rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        .school-logo:hover {
            transform: rotateY(10deg) rotateX(5deg);
        }

        .school-name {
            font-family: 'Orbitron', sans-serif;
            color: var(--futuristic-white);
            font-size: 32px;
            font-weight: 900;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 
                0 0 10px rgba(255, 0, 51, 0.5),
                0 0 20px rgba(255, 0, 51, 0.3);
        }

        .school-motto {
            color: var(--glow-blue);
            font-size: 18px;
            font-weight: 500;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(0, 204, 255, 0.5);
        }

        .login-form {
            margin-top: 40px;
        }

        .form-group {
            margin-bottom: 30px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            color: var(--glow-blue);
            font-weight: 600;
            font-size: 15px;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .form-control {
            width: 100%;
            padding: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 51, 0.3);
            border-radius: 12px;
            font-size: 16px;
            color: var(--futuristic-white);
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--neon-red);
            box-shadow: 
                0 0 20px rgba(255, 0, 51, 0.3),
                inset 0 0 10px rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .user-type-selector {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .user-type-btn {
            padding: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 0, 51, 0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 600;
            color: var(--futuristic-white);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .user-type-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 0, 51, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .user-type-btn:hover::before {
            left: 100%;
        }

        .user-type-btn:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 15px rgba(255, 0, 51, 0.3);
            transform: translateY(-2px);
        }

        .user-type-btn.active {
            background: rgba(255, 0, 51, 0.15);
            border-color: var(--neon-red);
            box-shadow: 
                0 0 20px rgba(255, 0, 51, 0.4),
                inset 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--neon-red) 0%, var(--light-maroon) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .login-btn:hover::before {
            left: 100%;
        }

        .login-btn:hover {
            transform: translateY(-3px);
            box-shadow: 
                0 10px 30px rgba(255, 0, 51, 0.4),
                0 0 40px rgba(255, 0, 51, 0.3);
        }

        .login-btn:active {
            transform: translateY(-1px);
        }

        .footer-links {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }

        .footer-link {
            color: var(--glow-blue);
            text-decoration: none;
            transition: all 0.3s ease;
            font-family: 'Rajdhani', sans-serif;
            font-weight: 500;
            position: relative;
            padding-bottom: 2px;
        }

        .footer-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--neon-red);
            transition: width 0.3s ease;
        }

        .footer-link:hover {
            color: var(--neon-red);
            text-shadow: 0 0 10px rgba(255, 0, 51, 0.3);
        }

        .footer-link:hover::after {
            width: 100%;
        }

        .language-selector {
            margin-top: 25px;
            font-size: 14px;
            color: var(--futuristic-white);
            font-family: 'Orbitron', sans-serif;
        }

        .language-btn {
            background: none;
            border: none;
            color: var(--glow-blue);
            cursor: pointer;
            font-weight: 600;
            margin: 0 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            position: relative;
            padding: 5px 10px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .language-btn:hover {
            color: var(--neon-red);
            background: rgba(255, 0, 51, 0.1);
            box-shadow: 0 0 10px rgba(255, 0, 51, 0.2);
        }
